project: "My-Go-Pipeline"
max_parallel: 2
env:
  GO_ENV: "test"
stages:
  - name: "Linting"
    run: "go vet ./..."
    parallel: true

  - name: "Security Check"
    run: "go test -race -v ./..."
    parallel: true
    retry: 1
    retry_delay: "2s"

  - name: "Build Binary"
    command: "go"
    args: ["build", "-o", "gopipe", "."]
